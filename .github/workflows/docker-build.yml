name: Build, Push and Update Helm

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }} ./app/demo-app
          docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}

      - name: Update Helm values.yaml
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s/tag: .*/tag: \"$IMAGE_TAG\"/" gitops/base/demo-app/helm/demo-app/values.yaml

      - name: Commit and Push changes
        run: |
          IMAGE_TAG=${{ github.sha }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/base/demo-app/helm/demo-app/values.yaml
          git commit -m "Update image tag to $IMAGE_TAG [skip ci]" || echo "No changes to commit"
          git push
