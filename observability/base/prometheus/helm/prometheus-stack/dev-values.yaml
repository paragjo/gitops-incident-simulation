grafana:
  adminPassword: admin
  service:
    type: NodePort

  sidecar:
    dashboards:
      enabled: false
    datasources:
      enabled: false

  resources:
    requests:
      memory: 100Mi
    limits:
      memory: 200Mi

prometheus:
  prometheusSpec:
    retention: 2h
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 500Mi

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false
  
nodeExporter:
  resources:
    requests:
      memory: 50Mi
