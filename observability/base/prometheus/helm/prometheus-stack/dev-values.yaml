grafana:
  adminPassword: admin
  service:
    type: NodePort

  sidecar:
    dashboards:
      enabled: false
    datasources:
      enabled: false

  resources:
    requests:
      memory: 150Mi
    limits:
      memory: 300Mi

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 600Mi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 100Mi
      limits:
        memory: 200Mi

kube-state-metrics:
  enabled: false
  
nodeExporter:
  resources:
    requests:
      memory: 50Mi
