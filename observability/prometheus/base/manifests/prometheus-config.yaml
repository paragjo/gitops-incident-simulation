apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: 'demo-app'
        static_configs:
          - targets: ["demo-app-dev-demo-app-chart.demo-app-dev.svc.cluster.local:3000"]
      - job_name: 'node-exporter'
        static_configs:
          - targets: ["172.18.0.2:9100"]
